<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-HUNTER.JP | Sanctuary of Data Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif}
body{background:#0a0a0f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}

/* 背景グラデーション */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(60,30,100,0.5) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(10,30,60,0.4) 0%,transparent 55%);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;text-align:center;padding:0 24px;width:100%;max-width:700px}

/* ロゴ */
.logo{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,7vw,90px);font-weight:900;letter-spacing:0;color:#fff;line-height:1;margin-bottom:20px}

/* 紫ライン */
.divider{width:80px;height:2px;background:linear-gradient(90deg,#7b5cff,#a78fff);margin:0 auto 28px}

/* サブタイトル */
.sub{font-family:'Space Grotesk',sans-serif;font-size:clamp(11px,2vw,13px);letter-spacing:.35em;color:rgba(255,255,255,0.7);margin-bottom:64px}

/* カードグリッド */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%}

/* カード共通 */
.card{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:28px 16px;text-decoration:none;transition:background .2s,border-color .2s}
.card.active:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25)}
.card.inactive{opacity:0.4;cursor:default}

/* カードアイコン */
.card-icon{font-size:36px;margin-bottom:14px;display:block}

/* カード名 */
.card-name{font-size:16px;font-weight:500;color:#fff;margin-bottom:8px}

/* カード説明 */
.card-desc{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.7}

/* フッター */
footer{position:relative;z-index:1;margin-top:60px;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:.1em;}

@media(max-width:480px){
  .logo{font-size:32px;letter-spacing:.04em}
  .sub{font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,0.85);margin-bottom:40px}
  .cards{grid-template-columns:1fr;max-width:320px;margin:0 auto;gap:12px}
  .card{padding:24px 20px;display:flex;align-items:center;gap:16px;text-align:left}
  .card-icon{font-size:32px;margin-bottom:0;flex-shrink:0}
  .card-name{font-size:16px;font-weight:700;margin-bottom:4px}
  .card-desc{font-size:12px;color:rgba(255,255,255,0.75)}
}
</style>
</head>
<body>

<div class="container">
  <h1 class="logo">AI HUNTER</h1>
  <div class="divider"></div>
  <p class="sub">SANCTUARY OF DATA ANALYSIS</p>

  <div class="cards">
    <a href="./ai-hunter-iching.html" class="card active">
      <span class="card-icon">☯</span>
      <div class="card-name">易学AI</div>
      <div class="card-desc">今週の流れを<br>64卦で解析</div>
    </a>

    <div class="card inactive">
      <span class="card-icon">🏇</span>
      <div class="card-name">競馬AI</div>
      <div class="card-desc">近日公開</div>
    </div>

    <div class="card inactive">
      <span class="card-icon">🎯</span>
      <div class="card-name">ロトAI</div>
      <div class="card-desc">近日公開</div>
    </div>
  </div>
</div>

<footer>© 2026 AI-HUNTER.JP</footer>

</body>
</html>
