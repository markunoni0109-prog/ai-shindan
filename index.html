<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HUNTER</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6CLDGG0DS9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --ink: #111111;
    --ink-soft: #444444;
    --muted: #9a9a9a;
    --hairline: #e4e4e4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--ink);
    font-family: 'Zen Kurenaido', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 72px 24px 40px;
  }

  h1 {
    font-size: 26px;
    font-weight: normal;
    letter-spacing: 6px;
    margin-bottom: 10px;
  }

  .tagline {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    margin-bottom: 76px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px 32px;
    max-width: 620px;
    width: 100%;
    margin-bottom: 88px;
  }

  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .circle {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--ink);
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .circle:hover { background: #f6f6f6; transform: translateY(-2px); }

  .circle-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .circle.coming {
    border: 1px dashed #d5d5d5;
    color: #cccccc;
    pointer-events: none;
  }

  .cell-name {
    font-size: 13px;
    letter-spacing: 1px;
  }

  .cell.disabled .cell-name { color: var(--muted); }

  .log-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .log-line .dot { font-size: 9px; line-height: 1; }
  .log-line.active { color: var(--ink-soft); }
  .log-line.active .dot { color: var(--ink); }

  .rule {
    width: 100%;
    max-width: 280px;
    border: none;
    border-top: 1px solid var(--hairline);
    margin-bottom: 20px;
  }

  footer {
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .domain {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .research-link {
    display: inline-block;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--ink);
    text-decoration: none;
    padding: 10px 22px;
    border: 1px solid var(--ink);
    border-radius: 20px;
    margin-bottom: 6px;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .research-link:hover { background: #f6f6f6; transform: translateY(-2px); }

  @media (max-width: 520px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      row-gap: 48px;
    }
  }
</style>
</head>
<body>

<h1>AI HUNTER</h1>
<p class="tagline">AIによるデータ研究の公開サイト</p>

<div class="grid">
  <div class="cell">
    <a href="./keiba_hunter.html" class="circle">
      <span class="circle-code">KB</span>
    </a>
    <span class="cell-name">競馬予測</span>
    <span class="log-line active"><span class="dot">●</span>LOGGED — 2026.05〜</span>
  </div>

  <div class="cell">
    <a href="./loto6_results.html" class="circle">
      <span class="circle-code">LT</span>
    </a>
    <span class="cell-name">ロト予測</span>
    <span class="log-line active"><span class="dot">●</span>LOGGED — 2026.07〜</span>
  </div>

  <div class="cell disabled">
    <div class="circle coming">
      <span class="circle-code">NB</span>
    </div>
    <span class="cell-name">ナンバーズ</span>
    <span class="log-line"><span class="dot">○</span>NOT LOGGED</span>
  </div>

  <div class="cell disabled">
    <div class="circle coming">
      <span class="circle-code">TT</span>
    </div>
    <span class="cell-name">toto予測</span>
    <span class="log-line"><span class="dot">○</span>NOT LOGGED</span>
  </div>
</div>

<hr class="rule">
<footer>
  <a href="./loto6_research.html" class="research-link">→ 研究日誌</a>
  <div class="domain">ai-hunter.jp</div>
</footer>

</body>
</html>
